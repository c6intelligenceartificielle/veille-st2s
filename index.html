<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille informationnelle — ST2S · BTS SP3S · CAPET SMS</title>
<style>
  :root {
    --bleu:   #1a4480; --bleu-c: #e8f0fb;
    --vert:   #1b7a4a; --vert-c: #e6f4ee;
    --violet: #4a3b8c; --viol-c: #eeecfb;
    --cyan:   #0e7490; --cyan-c: #e0f2f7;
    --terre:  #8c3a1b; --terr-c: #fbeee9;
    --ambre:  #7a4f0a; --ambr-c: #fdf3e3;
    --rose:   #8b1a4a; --rose-c: #fce8f1;
    --fond: #f5f6f8; --bord: #dde1e9;
    --txt: #4a5568; --txt2: #718096;
    --blanc: #fff; --noir: #1a202c;
    --r: 10px; --rs: 6px;
    --ombre: 0 1px 4px rgba(0,0,0,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--fond); color: var(--noir); font-size: 15px; line-height: 1.6; min-height: 100vh; }

  header { background: var(--blanc); border-bottom: 1px solid var(--bord); padding: 0 2rem; position: sticky; top: 0; z-index: 100; box-shadow: var(--ombre); }
  .hinner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: .9rem 0; flex-wrap: wrap; }
  .htitle h1 { font-size: 17px; font-weight: 700; color: var(--bleu); letter-spacing: -.3px; }
  .htitle p  { font-size: 12px; color: var(--txt2); margin-top: 1px; }
  .hbtns { display: flex; align-items: center; gap: 8px; }

  .btn-gen { display: flex; align-items: center; gap: 7px; background: var(--bleu); color: #fff; border: none; border-radius: var(--rs); padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, transform .1s; }
  .btn-gen:hover { background: #153a6e; }
  .btn-gen:active { transform: scale(.98); }
  .btn-gen:disabled { opacity: .55; cursor: not-allowed; transform: none; }
  .btn-sec { display: flex; align-items: center; gap: 5px; background: var(--blanc); color: var(--txt); border: 1px solid var(--bord); border-radius: var(--rs); padding: 8px 13px; font-size: 12px; cursor: pointer; transition: background .15s; }
  .btn-sec:hover { background: var(--fond); }

  .filtres { background: var(--blanc); border-bottom: 1px solid var(--bord); padding: 0 2rem; }
  .finner  { max-width: 1100px; margin: 0 auto; padding: 8px 0; display: flex; flex-direction: column; gap: 7px; }
  .frow    { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .flabel  { font-size: 11px; font-weight: 700; color: var(--txt2); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; flex-shrink: 0; min-width: 50px; }

  .dropdown-themes { position: relative; }
  .dropdown-btn { display: flex; align-items: center; gap: 8px; background: var(--blanc); color: var(--txt); border: 1px solid var(--bord); border-radius: var(--rs); padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; transition: border-color .15s, box-shadow .15s; min-width: 220px; justify-content: space-between; }
  .dropdown-btn:hover { border-color: var(--bleu); }
  .dropdown-btn.open { border-color: var(--bleu); box-shadow: 0 0 0 2px rgba(26,68,128,.12); }
  .dropdown-arrow { font-size: 9px; transition: transform .15s; color: var(--txt2); }
  .dropdown-btn.open .dropdown-arrow { transform: rotate(180deg); }
  .dropdown-panel { display: none; position: absolute; top: calc(100% + 4px); left: 0; min-width: 250px; background: var(--blanc); border: 1px solid var(--bord); border-radius: var(--r); box-shadow: 0 4px 18px rgba(0,0,0,.11); z-index: 200; padding: 5px 0; }
  .dropdown-panel.open { display: block; }
  .dropdown-panel label { display: flex; align-items: center; gap: 9px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: var(--txt); transition: background .1s; }
  .dropdown-panel label:hover { background: var(--fond); }
  .dropdown-panel input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--bleu); cursor: pointer; flex-shrink: 0; }
  .dropdown-divider { height: 1px; background: var(--bord); margin: 4px 0; }
  .dropdown-all { font-size: 11px; color: var(--txt2); padding: 4px 14px 2px; display: flex; gap: 10px; }
  .dropdown-all button { background: none; border: none; color: var(--bleu); font-size: 11px; cursor: pointer; padding: 0; text-decoration: underline; }

  .nchips { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .nchip  { background: var(--fond); color: var(--txt2); border: 1px solid var(--bord); border-radius: 999px; padding: 3px 11px; font-size: 12px; font-weight: 500; cursor: pointer; transition: background .12s, border-color .12s, color .12s; white-space: nowrap; }
  .nchip:hover  { border-color: var(--bleu); color: var(--bleu); background: var(--bleu-c); }
  .nchip.active { background: var(--bleu); color: #fff; border-color: var(--bleu); }

  .search-wrap { position: relative; display: flex; align-items: center; margin-left: auto; }
  .search-ico  { position: absolute; left: 9px; font-size: 13px; pointer-events: none; line-height: 1; }
  .search-input { border: 1px solid var(--bord); border-radius: var(--rs); padding: 6px 28px 6px 30px; font-size: 13px; color: var(--noir); background: var(--blanc); outline: none; transition: border-color .15s, box-shadow .15s; width: 230px; }
  .search-input:focus { border-color: var(--bleu); box-shadow: 0 0 0 2px rgba(26,68,128,.10); }
  .search-input::placeholder { color: var(--txt2); }
  .search-clear { position: absolute; right: 8px; background: none; border: none; color: var(--txt2); cursor: pointer; font-size: 14px; display: none; align-items: center; padding: 0; line-height: 1; }
  .search-clear:hover { color: var(--noir); }

  .status-zone { max-width: 1100px; margin: .8rem auto 0; padding: 0 2rem; }
  .sbar  { font-size: 13px; color: var(--txt2); display: flex; align-items: center; gap: 8px; min-height: 20px; }
  .spin  { width: 13px; height: 13px; border: 2px solid var(--bord); border-top-color: var(--bleu); border-radius: 50%; animation: spin .7s linear infinite; display: none; flex-shrink: 0; }
  .sbar.loading .spin { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main { max-width: 1100px; margin: 1.2rem auto 4rem; padding: 0 2rem; }

  .empty { text-align: center; padding: 5rem 2rem; color: var(--txt2); }
  .empty .ico { font-size: 48px; opacity: .2; margin-bottom: 1rem; }
  .empty h2   { font-size: 19px; font-weight: 600; margin-bottom: 8px; color: var(--txt); }
  .empty p    { font-size: 13px; max-width: 400px; margin: 0 auto; line-height: 1.7; }

  .stats { background: var(--blanc); border: 1px solid var(--bord); border-radius: var(--r); padding: 10px 18px; display: flex; gap: 2rem; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center; }
  .stat   { text-align: center; }
  .stat-n { font-size: 20px; font-weight: 700; color: var(--bleu); }
  .stat-l { font-size: 11px; color: var(--txt2); text-transform: uppercase; letter-spacing: .4px; }

  .section   { margin-bottom: 2.2rem; }
  .sec-head  { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid; }
  .sec-dot   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .sec-head h2 { font-size: 14px; font-weight: 700; }
  .sec-niv  { display: flex; gap: 4px; flex-wrap: wrap; margin-left: 6px; }
  .sec-niv span { font-size: 10px; padding: 1px 7px; border-radius: 999px; font-weight: 500; opacity: .75; }
  .sec-cnt   { font-size: 12px; color: var(--txt2); margin-left: auto; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }

  .card { background: var(--blanc); border: 1px solid var(--bord); border-left: 3px solid; border-radius: var(--r); padding: 14px; display: flex; flex-direction: column; gap: 9px; box-shadow: var(--ombre); transition: box-shadow .15s, transform .12s; }
  .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.10); transform: translateY(-1px); }
